    <script>
        var progressElement = document.getElementById('progress_fill');
        var container = document.getElementById("unity-container");
        var canvas = document.getElementById("unity-canvas");
        var loadingBar = document.querySelector("#loadingBlock");
        var progressBarFull = document.querySelector("#progress_fill");
        var progress_text = document.querySelector(".gameloader-progress-info");
        var splash = document.getElementById("splash");
        let text_percent = "";

        function tryEnterGame() {
            if (_prerollAdFinished && _unityInstanceReady && !_adIsPlaying) {
                console.log("[GMSOFT] Both preroll ad finished and Unity ready. Entering game.");
                splash.style.display = "none";
                loadingBar.style.display = "none";
                container.style.display = "block";
                window.focus();
            }
        }
        // Wait for GMSOFT_adsInfo and afg ready then show preroll ad before Unity loads

        // Load Unity instance
        var script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {
            var saved_progess = 0;
            createUnityInstance(canvas, config, (progress) => {

                progress = Math.round(progress * 100);
                if (saved_progess == progress) {
                    return;
                }
                saved_progess = progress;
                progressElement.style.width = progress + "%";
                text_percent = "Downloading file: " + progress + "%";
                progress_text.innerText = text_percent;
                if (progress >= 99) {
                    progress_text.innerText = "Game Loading ...";
                }
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                setTimeout(function() {
                    _unityInstanceReady = true;
                    tryEnterGame();
                }, 2000);
                loadingBar.style.display = "none";
                splash.style.display = "flex";
                window.focus();
            }).catch((message) => {
                alert(message);
            });
        };

        document.body.appendChild(script);
    </script>

    <script>
        function isFirebaseReady() {
            try {
                return typeof firebase !== "undefined" &&
                    firebase.apps &&
                    firebase.apps.length > 0;
            } catch (e) {
                return false;
            }
        }

        var enable_firebase = isFirebaseReady();

        function firebaseSetUserProperties(props) {
            try {
                if (enable_firebase) {
                    firebase.analytics().setUserProperties(props);
                }
            } catch (e) {}
        }

        function firebaseLogEvent(event_name) {
            try {
                if (enable_firebase) {
                    firebase.analytics().logEvent(event_name);
                }
            } catch (e) {}
        }

        function firebaseLogEventParameter(event_name, event_param) {
            try {
                if (enable_firebase) {
                    firebase.analytics().logEvent(event_name, event_param);
                }
            } catch (e) {}
        }
    </script>
